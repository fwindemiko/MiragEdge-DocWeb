name: CI/CD 持续集成

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# 允许并发运行，取消旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x
  PNPM_VERSION: 10.15.0
  TEST_OUTPUT_DIR: test_tool

jobs:
  # ============================================
  # ===== 作业1: 代码质量检查 =====
  # ============================================
  lint:
    name: 代码质量检查
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 pnpm 包管理器
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装项目依赖
        run: pnpm install

      - name: 复制 mark.js 依赖
        run: cp -rf ./.vitepress/mark.js ./node_modules/

      - name: TypeScript 类型检查
        run: pnpm run typecheck 2>&1 || echo "跳过 typecheck (未配置)"

  # ============================================
  # ===== 作业2: 单元测试 =====
  # ============================================
  unit-test:
    name: 单元测试
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm 包管理器
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装项目依赖
        run: pnpm install

      - name: 复制 mark.js 依赖
        run: cp -rf ./.vitepress/mark.js ./node_modules/

      - name: 创建测试目录
        run: |
          mkdir -p "${{ env.TEST_OUTPUT_DIR }}/test/coverage"
          mkdir -p "${{ env.TEST_OUTPUT_DIR }}/test/test-results"
          mkdir -p "${{ env.TEST_OUTPUT_DIR }}/test/logs"

      - name: 运行单元测试
        id: unit-tests
        run: |
          echo "=== 开始执行单元测试 ==="
          pnpm run test:unit 2>&1 | tee "${{ env.TEST_OUTPUT_DIR }}/test/logs/unit-test.log"
          echo "unit_exit_code=$?" >> $GITHUB_OUTPUT

      - name: 上传单元测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_id }}
          path: "${{ env.TEST_OUTPUT_DIR }}/test/logs/unit-test.log"
          retention-days: 7

  # ============================================
  # ===== 作业3: 构建与覆盖率测试 =====
  # ============================================
  build-test:
    name: 构建与覆盖率测试
    name: 构建与覆盖率测试
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm 包管理器
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装项目依赖
        run: pnpm install

      - name: 复制 mark.js 依赖
        run: cp -rf ./.vitepress/mark.js ./node_modules/

      - name: 构建网站项目
        env:
          GH_TOKEN: ${{ secrets.GH_showContributors_token }}
          GITHUB_TOKEN: ${{ secrets.GH_showContributors_token }}
        run: pnpm run build

      - name: 运行覆盖率测试
        id: coverage
        run: |
          echo "=== 开始覆盖率测试 ==="
          pnpm run test:coverage 2>&1 | tee "${{ env.TEST_OUTPUT_DIR }}/test/logs/coverage.log"
          COVERAGE_EXIT_CODE=$?
          echo "coverage_exit_code=$COVERAGE_EXIT_CODE" >> $GITHUB_OUTPUT

          if [ -f "${{ env.TEST_OUTPUT_DIR }}/test/test-results/test-output.json" ]; then
            echo "✓ 测试报告生成成功"
          fi

          if [ -d "${{ env.TEST_OUTPUT_DIR }}/test/coverage" ]; then
            echo "✓ 覆盖率报告生成成功"
          fi
        continue-on-error: true

      - name: 上传覆盖率结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results-${{ github.run_id }}
          path: "${{ env.TEST_OUTPUT_DIR }}/test/"
          retention-days: 7

  # ============================================
  # ===== 作业4: 部署到服务器 ===== (仅 main 分支推送时)
  # ============================================
  deploy:
    name: 部署到服务器
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 配置 SSH 密钥
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.actions }}

      - name: 添加服务器信任
        run: ssh-keyscan -H 110.42.45.207 >> ~/.ssh/known_hosts

      - name: 部署到服务器
        run: |
          REMOTE_USER="root"
          REMOTE_HOST="110.42.45.207"
          REMOTE_PORT="22"
          REMOTE_PATH="/www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/"
          PACKAGE_NAME="build-${{ github.run_id }}.tar.gz"

          # 下载构建产物
          gh run download ${{ github.run_id }} -n "built-site-${{ github.run_id }}.tar" -D /tmp || true

          # 确保远程目录存在
          ssh -p "$REMOTE_PORT" "${REMOTE_USER}@${REMOTE_HOST}" "mkdir -p ${REMOTE_PATH}"

          # 上传并解压
          scp -P "$REMOTE_PORT" "/tmp/$PACKAGE_NAME" "${REMOTE_USER}@${REMOTE_HOST}:/tmp/$PACKAGE_NAME"
          ssh -p "$REMOTE_PORT" "${REMOTE_USER}@${REMOTE_HOST}" '
            rm -rf "${REMOTE_PATH}"*
            tar -xzf "/tmp/$PACKAGE_NAME" -C "${REMOTE_PATH}" --strip-components=1
            rm -f "/tmp/$PACKAGE_NAME"
          '

          echo "✅ 部署完成！"
