version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-5173}:80"
      - "${PHP_PORT:-5174}:88"
    volumes:
      # WordPress 目录
      - /www/MiragEdge/fwindemiko:/web_fwindemiko:ro
      # 静态站点目录
      - .././build/miragedge.top:/web_miragedge:ro
      # Nginx 配置文件
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php8:
        condition: service_started
    networks:
      - miragedge-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------- PHP 8-FPM 服务 ----------
  php8:
    build: ./php
    container_name: php8
    restart: unless-stopped
    volumes:
      - /www/MiragEdge/fwindemiko:/web_fwindemiko
    networks:
      - miragedge-network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm8 -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mariadb:10.11
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: fwindemiko
      MYSQL_USER: fwindemiko
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - /www/MiragEdge/mysql:/var/lib/mysql
    networks:
      - miragedge-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  miragedge-network:
    external: true
