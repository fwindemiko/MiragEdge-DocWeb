name: CI/CD 持续集成
on: [push, pull_request]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 添加权限以获取完整历史
permissions:
  contents: read
  pull-requests: read
  actions: read

env:
  NODE_VERSION: 22.x
  PNPM_VERSION: 10.15.0

jobs:
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 git 历史，用于 contributors 和 lastUpdated
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install && pnpm run typecheck 2>&1 || echo "跳过"

  test:
    name: 测试
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install && cp -rf ./.vitepress/mark.js ./node_modules/ && pnpm run build
      - name: 打包
        if: github.event_name == 'push'
        run: tar -czf site.tar.gz -C .vitepress/dist .
      - name: 上传构建产物
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site.tar.gz
          retention-days: 1

  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./
      - name: 部署
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.actions }}
      - name: 远程部署
        run: |
          set -e
          ssh-keyscan -H miragedge.top >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H deploy.miragedge.top >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -o ConnectTimeout=60 -o StrictHostKeyChecking=no site.tar.gz root@deploy.miragedge.top:/tmp/
          ssh -o ConnectTimeout=60 -o StrictHostKeyChecking=no root@deploy.miragedge.top << 'ENDSSH'
            mkdir -p /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/
            rm -rf /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/*
            tar -xzf /tmp/site.tar.gz -C /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/
            rm /tmp/site.tar.gz
            echo "部署成功"
          ENDSSH