# miragedge.top 的配置
server {
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    listen 80;
    server_name miragedge.top;
    index index.html;

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
    }

    location / {
        root /web_miragedge;

        try_files $uri $uri.html $uri/ =404;

        error_page 404 /404x.html;
        error_page 403 /404x.html;

        location ~* ^/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# f.windemiko.top 的配置（支持 PHP）
server {
    listen 88;
    server_name f.windemiko.top;
    client_max_body_size 100M;
    root /web_fwindemiko;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php8:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # 根据转发的头信息自动识别 HTTPS
        set $fastcgi_https off;
        if ($http_x_forwarded_proto = "https") {
            set $fastcgi_https on;
        }
        fastcgi_param HTTPS $fastcgi_https;
        
        include fastcgi_params;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 安全限制 - 禁止访问隐藏文件和敏感文件
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location ~* /(\.git|wp-config\.php|readme\.html|license\.txt|install\.php) {
        deny all;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
