name: CI/CD 持续集成
on: [push, pull_request]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  NODE_VERSION: 22.x
  PNPM_VERSION: 10.15.0
jobs:
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }} }
      - run: pnpm install && pnpm run typecheck 2>&1 || echo "跳过"

  test:
    name: 测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: ${{ env.PNPM_VERSION }} }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }} }
      - run: pnpm install && pnpm run build

  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: 打包
        run: tar -czf /tmp/site.tar.gz -C .vitepress/dist .
      - name: 上传
        uses: actions/upload-artifact@v4
        with: { name: site, path: /tmp/site.tar.gz }
      - name: 部署
        uses: webfactory/ssh-agent@v0.5.3
        with: { ssh-private-key: ${{ secrets.actions }} }
      - run: |
          ssh-keyscan -H 110.42.45.207 >> ~/.ssh/known_hosts
          ssh -p 22 root@110.42.45.207 "
            mkdir -p /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/ &&
            rm -rf /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/* &&
            tar -xzf /tmp/site.tar.gz -C /www/MiragEdge/MiragEdge-DocWeb/build/miragedge.top/ &&
            rm /tmp/site.tar.gz &&
            echo 部署成功
          "
